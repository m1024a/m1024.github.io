<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAJAYA｜Personal Brand</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

body{
height:100%;
overflow:hidden;
background:#05060a;
color:#fff;
}

/* ================= 星空背景 ================= */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* ================= 页面容器 ================= */
.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transform:translateY(40px) scale(1.05);
transition:0.8s ease;
pointer-events:none;
text-align:center;
padding:20px;
z-index:2;
}

.active{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}

/* ================= 标题 ================= */
h1{
font-size:36px;
letter-spacing:2px;
text-shadow:0 0 25px #00f2ff55;
}

p{
margin-top:10px;
opacity:0.75;
line-height:1.6;
}

/* ================= 打字机 ================= */
.type{
font-size:14px;
opacity:0.6;
margin-top:10px;
border-right:2px solid #00f2ff;
white-space:nowrap;
overflow:hidden;
width:0;
animation:typing 3s steps(30,end) forwards,blink 0.8s infinite;
}

@keyframes typing{
to{width:260px;}
}
@keyframes blink{
50%{border-color:transparent;}
}

/* ================= 卡片 ================= */
.card{
margin-top:14px;
padding:16px;
width:85%;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(14px);
border:1px solid rgba(0,242,255,0.25);
box-shadow:0 0 25px rgba(0,242,255,0.08);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 35px rgba(0,242,255,0.2);
}

/* ================= 按钮 ================= */
.btn{
margin-top:18px;
padding:12px 26px;
border-radius:30px;
border:1px solid #00f2ff;
color:#00f2ff;
text-decoration:none;
display:inline-block;
transition:0.3s;
box-shadow:0 0 15px rgba(0,242,255,0.15);
}

.btn:hover{
background:#00f2ff;
color:#000;
transform:translateY(-2px);
box-shadow:0 0 25px #00f2ff;
}

/* ================= 加载 ================= */
.loader{
width:80%;
height:6px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:20px;
border:1px solid #00f2ff33;
}

.loader div{
height:100%;
width:0%;
background:linear-gradient(90deg,#00f2ff,#8a2be2);
animation:load 2.5s forwards;
}

@keyframes load{
to{width:100%;}
}

/* ================= 触控提示 ================= */
.tip{
position:fixed;
bottom:20px;
font-size:12px;
opacity:0.4;
z-index:3;
}
</style>
</head>

<body>

<canvas id="star"></canvas>

<!-- 加载页 -->
<div class="page active" id="p0">
<h1>MAJAYA</h1>
<div class="type">Personal Brand System Loading...</div>
<div class="loader"><div></div></div>
</div>

<!-- 首页 -->
<div class="page" id="p1">
<h1>MAJAYA</h1>
<p>New Media Creator / Visual Designer</p>
<p>用视觉表达思想，让创意产生力量</p>
<div class="btn" onclick="next()">进入作品世界</div>
</div>

<!-- 内页1 -->
<div class="page" id="p2">
<h1>关于我</h1>

<div class="card">视觉设计 / AI创作 / 视频剪辑</div>
<div class="card">擅长品牌视觉与创意表达</div>

<a class="btn" href="https://www.baidu.com" target="_blank">查看作品集</a>
<div class="btn" onclick="next()">继续探索 →</div>
</div>

<!-- 内页2 -->
<div class="page" id="p3">
<h1>作品展览</h1>

<div class="card">◼ 品牌视觉设计系统</div>
<div class="card">◼ AI生成视觉实验</div>
<div class="card">◼ 短视频内容创作</div>

<div class="btn" onclick="next()">进入终章</div>
</div>

<!-- 尾页 -->
<div class="page" id="p4">
<h1>THANK YOU</h1>
<p>感谢浏览我的个人品牌作品</p>

<a class="btn" href="https://www.instagram.com" target="_blank">Instagram</a>
<a class="btn" href="https://www.bilibili.com" target="_blank">Bilibili</a>
</div>

<div class="tip">↑ 滑动 / 点击切换页面</div>

<script>
/* ================= 翻页逻辑 ================= */
let index=0;
const pages=document.querySelectorAll(".page");

function show(i){
pages.forEach(p=>p.classList.remove("active"));
pages[i].classList.add("active");
}

function next(){
if(index<pages.length-1){
index++;
show(index);
}
}

/* 自动进入首页 */
setTimeout(()=>{
index=1;
show(1);
},2600);

/* ================= 星空粒子 ================= */
const canvas=document.getElementById("star");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
d:Math.random()*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

for(let i=0;i<stars.length;i++){
let s=stars[i];
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=s.d;
if(s.y>canvas.height){
s.y=0;
s.x=Math.random()*canvas.width;
}
}
requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
